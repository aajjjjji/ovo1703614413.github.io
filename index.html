<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
    <title>测试网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; background: #000; }
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden;
        }
        .video-bg video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
            transform: translateZ(0); will-change: transform;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.15), rgba(0,0,0,0.55));
            z-index: 1; pointer-events: none;
        }
        .content {
            position: relative; z-index: 2; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 2rem 1.5rem;
        }
        .hero { text-align: center; margin-top: 10vh; }
        .hero h1 {
            font-size: clamp(2.2rem, 7vw, 4.5rem);
            background: linear-gradient(135deg, #fff, #d0d0ff, #b0b0ff);
            background-clip: text; -webkit-background-clip: text;
            color: transparent; text-shadow: 0 0 20px rgba(100,150,255,0.3);
            letter-spacing: 2px;
        }
        .hero p { color: rgba(255,255,255,0.85); margin-top: 0.8rem; font-size: 1.1rem; }
        .btn-group {
            display: flex; justify-content: center; gap: 1.8rem; margin-bottom: 8vh; flex-wrap: wrap;
        }
        .acrylic-btn {
            padding: 0.9rem 2.4rem; background: rgba(20,30,50,0.25);
            backdrop-filter: blur(14px) saturate(180%); -webkit-backdrop-filter: blur(14px) saturate(180%);
            border-radius: 60px; border: 1px solid rgba(255,255,255,0.35);
            color: white; font-size: 1.2rem; font-weight: 500; cursor: pointer;
            transition: all 0.25s; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .acrylic-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
        .acrylic-btn:active { transform: translateY(2px); }
        @media (max-width: 640px) {
            .acrylic-btn { padding: 0.7rem 1.6rem; font-size: 1rem; }
            .content { padding: 1.5rem 1rem; }
        }

        /* 模态框 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); backdrop-filter: blur(12px); align-items: center; justify-content: center; }
        .modal-card { background: rgba(18,25,45,0.8); backdrop-filter: blur(24px); border-radius: 2.5rem; padding: 1.8rem; max-width: 900px; border: 1px solid rgba(255,255,255,0.3); color: white; }
        .iframe-wrapper { background: #0b1018; border-radius: 24px; padding: 6px; margin: 20px 0; }
        .web-iframe { width: 100%; border: none; border-radius: 18px; background: #fff; min-height: 380px; height: 60vh; }
        .qq-photo-wrapper { background: rgba(0,0,0,0.5); border-radius: 28px; padding: 12px; margin: 20px 0; }
        .qq-card-video { width: 100%; max-width: 560px; border-radius: 24px; }
        .action-btn, .close-modal-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); padding: 0.7rem 1.8rem; border-radius: 60px; color: white; cursor: pointer; backdrop-filter: blur(8px); }
        #bgHint {
            position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.55); font-size: 0.75rem; z-index: 10;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(6px);
            width: fit-content; margin: 0 auto; padding: 4px 14px; border-radius: 60px;
        }

        /* 极简抽屉 */
        #lightSettingsBtn {
            position: fixed; top: 18px; right: 18px; z-index: 10000;
            width: 48px; height: 48px; border-radius: 30px;
            background: #1e2a3a; border: 1px solid #3a4a5a;
            color: white; font-size: 26px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; transition: transform 0.1s;
        }
        #lightSettingsBtn:active { transform: scale(0.95); }
        #lightOverlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 10001;
            background: rgba(0,0,0,0.5); display: none;
        }
        #lightDrawer {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 10002;
            background: #1a2332;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            transform: translateY(100%); transition: transform 0.2s ease-out;
            will-change: transform; padding: 16px 18px 25px;
            max-height: 80vh; overflow-y: auto; color: #eee;
            -webkit-overflow-scrolling: touch;
        }
        #lightDrawer.show { transform: translateY(0); }
        .light-handle {
            width: 45px; height: 5px; background: #4a5a6a; border-radius: 10px;
            margin: 0 auto 18px; cursor: grab; touch-action: none;
        }
        .light-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; text-align: center; }
        .light-section { margin-bottom: 20px; }
        .light-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .light-btn {
            background: #2a3a4a; border: none; border-radius: 40px; padding: 10px 16px;
            color: white; font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
        }
        .light-btn.small { padding: 6px 12px; font-size: 0.8rem; }
        .light-btn:hover { background: #3a4a5a; }
        .light-input, .light-select {
            width: 100%; background: #0f1a24; border: 1px solid #2a3a4a; border-radius: 40px;
            padding: 10px 14px; color: white; font-size: 0.9rem; outline: none; margin-bottom: 8px;
        }
        .light-select { margin-right: 6px; }
        #lightSecretSection { display: none; border-top: 1px dashed #3a4a5a; padding-top: 16px; margin-top: 10px; }
        #lightSecretSection.visible { display: block; }
        .light-switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .light-switch input { opacity: 0; width: 0; height: 0; }
        .light-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2a3a4a; transition: .2s; border-radius: 22px; }
        .light-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .2s; border-radius: 50%; }
        input:checked + .light-slider { background-color: #5f9eff; }
        input:checked + .light-slider:before { transform: translateX(22px); }

        /* 滑动验证 */
        #captchaModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100000;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
        }
        .captcha-card {
            width: 320px; background: #1e2a3a; border-radius: 32px; padding: 24px 20px;
            border: 1px solid #3a4a5a; color: white; text-align: center;
        }
        .captcha-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; }
        .captcha-desc { font-size: 0.85rem; opacity: 0.8; margin-bottom: 20px; }
        .slider-container {
            position: relative; width: 100%; height: 48px; background: #0f1a24;
            border-radius: 40px; border: 1px solid #3a4a5a; margin-bottom: 16px; overflow: hidden;
        }
        .slider-track {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #5f9eff, #7ab8ff); border-radius: 40px;
        }
        .slider-thumb {
            position: absolute; left: 0; top: 0; width: 48px; height: 48px;
            background: white; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: grab; user-select: none; touch-action: none; z-index: 10;
            border: 2px solid #5f9eff; transition: none;
        }
        .slider-thumb:active { cursor: grabbing; background: #f0f0ff; }
        .slider-text {
            position: absolute; left: 0; right: 0; line-height: 48px; text-align: center;
            color: rgba(255,255,255,0.7); font-size: 0.9rem; pointer-events: none; z-index: 5;
        }
        .captcha-footer { display: flex; justify-content: flex-end; }
        .captcha-btn {
            background: #2a3a4a; border: none; border-radius: 40px; padding: 8px 20px;
            color: white; cursor: pointer; font-size: 0.9rem;
        }
        .captcha-success { color: #8eff8e; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="video-bg">
    <video id="desktopVideo" muted loop playsinline><source src="电脑默认" type="video/mp4"></video>
    <video id="mobileVideo" muted loop playsinline><source src="手机默认" type="video/mp4"></video>
</div>
<div class="overlay"></div>

<div class="content">
    <div class="hero"><h1>一个测试网站</h1><p></p></div>
    <div class="btn-group">
        <button class="acrylic-btn" id="btn1">交流群</button>
        <button class="acrylic-btn" id="btn2">测试</button>
        <button class="acrylic-btn" id="btn3">QQ名片</button>
    </div>
</div>


<div id="previewModal" class="modal">
    <div class="modal-card">
        <h3>不知道写啥</h3>
        <div class="fixed-url-hint" id="fixedUrlDisplay">加载中...</div>
        <div class="iframe-wrapper">
            <iframe id="fixedIframe" class="web-iframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" allow="fullscreen; autoplay"></iframe>
        </div>
        <div class="status-bar"><span id="loadStatus"></span></div>
        <button class="close-modal-btn" id="closePreviewBtn">关 闭</button>
    </div>
</div>
<div id="qqModal" class="modal">
    <div class="modal-card">
        <h3> QQ 名 片 </h3>
        <div class="qq-photo-wrapper">
            <video id="qqCardVideo" class="qq-card-video" autoplay muted loop playsinline poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1e2a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23888' font-size='14'%3E🎬 加载中%3C/text%3E%3C/svg%3E">
                <source src="QQ名片.mp4" type="video/mp4">
            </video>
        </div>
        <div class="fixed-url-hint" style="margin-top: -5px; margin-bottom: 10px;">有什么事情可以联系我</div>
        <div class="modal-buttons-group">
            <button id="openQQHomeBtn" class="action-btn">🐧 跳转QQ主页</button>
            <button id="closeQQModalBtn" class="action-btn">关 闭</button>
        </div>
        <div class="status-bar"><span>📖 本人还是个学生，时间不算多</span></div>
    </div>
</div>


<div id="captchaModal">
    <div class="captcha-card">
        <div class="captcha-title">滑过去确认你17+</div>
        <div class="captcha-desc">向右滑动滑块完成验证</div>
        <div class="slider-container" id="sliderContainer">
            <div class="slider-track" id="sliderTrack"></div>
            <div class="slider-text" id="sliderText">拖动滑块到最右侧</div>
            <div class="slider-thumb" id="sliderThumb">→</div>
        </div>
        <div class="captcha-success" id="captchaSuccess">✅ 验证通过！</div>
        <div class="captcha-footer">
            <button class="captcha-btn" id="captchaCancelBtn">取消</button>
        </div>
    </div>
</div>


<div id="lightSettingsBtn">⚙️</div>
<div id="lightOverlay"></div>
<div id="lightDrawer">
    <div class="light-handle" id="lightHandle"></div>
    <div class="light-title">设置</div>

    <div class="light-section">
        <div class="light-item">
            <span>🎵 背景音乐</span>
            <label class="light-switch">
                <input type="checkbox" id="lightMusicToggle">
                <span class="light-slider"></span>
            </label>
        </div>
    </div>

    <div class="light-section">
        <div style="margin-bottom:6px;">自定义链接</div>
        <input class="light-input" id="lightVideoUrlInput" placeholder="粘贴视频直链">
        <button class="light-btn" id="lightApplyUrlBtn" style="width:100%;">应用链接</button>
    </div>

    <div class="light-section">
        <div style="margin-bottom:6px;">B站解析成背景</div>
        <input class="light-input" id="lightParseInput" placeholder="输入 AV/BV 号">
        <button class="light-btn" id="lightParseBtn" style="width:100%;">设为背景</button>
        <div id="lightParseStatus" style="font-size:0.75rem; margin-top:6px;"></div>
    </div>

    <div class="light-section">
        <div style="margin-bottom:6px;">📋 B站历史缓存</div>
        <div style="display:flex; gap:6px;">
            <select class="light-select" id="lightHistorySelect"><option value="">-- 选择 --</option></select>
            <button class="light-btn small" id="lightApplyHistoryBtn">应用</button>
            <button class="light-btn small" id="lightClearHistoryBtn">清空</button>
        </div>
        <div style="display:flex; gap:6px; margin-top:8px;">
            <input class="light-input" id="lightNewHistoryInput" placeholder="添加BV/链接" style="margin:0;">
            <button class="light-btn small" id="lightAddHistoryBtn">➕</button>
        </div>
        <div style="font-size:0.75rem; margin-top:6px;">
            <span>已保存 <span id="lightHistoryCount">0</span> 条</span>
            <span style="float:right; cursor:pointer; color:#5f9eff;" id="lightCaptureBtn">📸 捕获</span>
        </div>
    </div>

    
    <div id="lightSecretSection">
        <div class="light-item">
            <span>开启🔞背景</span>
            <label class="light-switch">
                <input type="checkbox" id="lightOtherBgToggle">
                <span class="light-slider"></span>
            </label>
        </div>
        <button class="light-btn small" id="lightNextOtherBtn" disabled style="width:100%;">切换18+背景</button>
        <div style="font-size:0.7rem; opacity:0.6; margin-top:6px;">开启默认你已18岁喵～ 视频来源于他人发我如果侵权请联系我删除</div>
    </div>
</div>

<script>

(function(){
    "use strict";

    
    const desktop = document.getElementById('desktopVideo');
    const mobile = document.getElementById('mobileVideo');
    const hint = document.getElementById('bgHint');
    const drawer = document.getElementById('lightDrawer');
    const overlay = document.getElementById('lightOverlay');
    const drawerBtn = document.getElementById('lightSettingsBtn');
    const handle = document.getElementById('lightHandle');

   
    const defDesktop = ['电脑默认','电脑第二个','电脑第三个','电脑第四个','电脑第五个','电脑第六个','电脑第七个','电脑第八个','电脑第九个'];
    const defMobile = ['手机默认','留空的请你再按一次'];
    const otherDesktop = ['电脑18+','电脑18+第二个','电脑18+第三个','电脑18+第四个','电脑18+第五个'];
    const otherMobile = ['手机18+','手机18+第二个','手机18+第三个'];
    let desktopIdx = 0, mobileIdx = 0, otherDesktopIdx = 0, otherMobileIdx = 0;

    function getActiveType() { return desktop.style.display !== 'none' ? 'desktop' : 'mobile'; }
    function getActiveVideo() { return getActiveType() === 'desktop' ? desktop : mobile; }
    function updateHint(text) {
        if (!hint) return;
        if (text) { hint.textContent = text; return; }
        const v = getActiveVideo(); let src = v ? v.src : '';
        let name = src.split('/').pop() || '未知'; if(name.length>25) name=name.slice(0,20)+'…';
        hint.textContent = `(✿^‿^) ${getActiveType()==='desktop'?'桌面背景':'手机背景'} · ${name}`;
    }
    function safePlay(v) { v && v.play().catch(()=>{}); }

    function switchDefault() {
        const t = getActiveType(); const v = getActiveVideo();
        const list = t==='desktop'? defDesktop : defMobile;
        let idx = t==='desktop'? desktopIdx : mobileIdx;
        idx = (idx+1) % list.length;
        v.src = list[idx]; v.load(); safePlay(v);
        if(t==='desktop') desktopIdx=idx; else mobileIdx=idx;
        updateHint();
    }
    function switchOther() {
        const tog = document.getElementById('lightOtherBgToggle');
        if(!tog.checked) { alert('请先开启🔞背景'); return; }
        const t = getActiveType(); const v = getActiveVideo();
        const list = t==='desktop'? otherDesktop : otherMobile;
        if(!list.length) return;
        let idx = t==='desktop'? otherDesktopIdx : otherMobileIdx;
        v.src = list[idx % list.length]; v.load(); safePlay(v);
        if(t==='desktop') otherDesktopIdx = (otherDesktopIdx+1)%list.length;
        else otherMobileIdx = (otherMobileIdx+1)%list.length;
        updateHint(`🔞 ${v.src.split('/').pop()}`);
    }
    window.switchOther = switchOther;

    function updateOrientation() {
        const isMobile = /iPhone|iPad|Android|Mobile|iPod/i.test(navigator.userAgent);
        const isLand = window.matchMedia('(orientation: landscape)').matches;
        const useDesk = !isMobile || isLand;
        desktop.style.display = useDesk ? 'block' : 'none';
        mobile.style.display = useDesk ? 'none' : 'block';
        const v = useDesk ? desktop : mobile;
        if(v.paused) safePlay(v);
        updateHint();
    }
    window.addEventListener('resize', updateOrientation);
    window.addEventListener('orientationchange', ()=>setTimeout(updateOrientation,30));
    updateOrientation();

    const btnGroup = document.querySelector('.btn-group');
    if(btnGroup && !document.getElementById('changeBgBtn')){
        const b = document.createElement('button');
        b.className='acrylic-btn'; b.id='changeBgBtn'; b.textContent='换背景';
        b.addEventListener('click', switchDefault);
        btnGroup.appendChild(b);
    }

   
    const musicToggle = document.getElementById('lightMusicToggle');
    const otherToggle = document.getElementById('lightOtherBgToggle');
    const nextOtherBtn = document.getElementById('lightNextOtherBtn');
    const secret = document.getElementById('lightSecretSection');
    const applyUrl = document.getElementById('lightApplyUrlBtn');
    const urlInput = document.getElementById('lightVideoUrlInput');
    const parseInput = document.getElementById('lightParseInput');
    const parseBtn = document.getElementById('lightParseBtn');
    const parseStatus = document.getElementById('lightParseStatus');

    musicToggle.addEventListener('change', ()=>{
        const v = getActiveVideo(); if(v) v.muted = !musicToggle.checked;
    });
    applyUrl.addEventListener('click', ()=>{
        const url = urlInput.value.trim(); if(!url) return;
        const v = getActiveVideo(); v.src = url; v.load(); safePlay(v);
        updateHint(url.split('/').pop()); urlInput.value = '';
    });
    parseBtn.addEventListener('click', async ()=>{
        const t = parseInput.value.trim(); if(!t) return;
        let id = t.match(/BV[a-zA-Z0-9]{10}/i)?.[0] || t.match(/av(\d+)/i)?.[0];
        if(!id) { alert('无效BV/AV'); return; }
        const type = id.startsWith('BV')?'bv':'av';
        parseStatus.textContent = '解析中...';
        try {
            const res = await fetch(`https://api.injahow.cn/bparse/?${type}=${id}&p=1&q=80&otype=url`);
            const url = (await res.text()).trim();
            if(url.startsWith('http')){
                const v = getActiveVideo(); v.src = url; v.load(); safePlay(v);
                updateHint(`B站: ${url.split('/').pop()}`);
                parseStatus.textContent = '✅ 成功'; parseInput.value = '';
            } else throw new Error();
        } catch(e) { parseStatus.textContent = '❌ 失败'; }
    });

   
    const historySelect = document.getElementById('lightHistorySelect');
    const STORAGE_KEY = 'biliHistory';
    function getHistory() { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
    function saveHistory(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0,15))); }
    function renderHistory() {
        const list = getHistory();
        historySelect.innerHTML = '<option value="">-- 选择 --</option>';
        list.forEach(i=>{ const o = document.createElement('option'); o.value=i.value; o.textContent=i.label; historySelect.appendChild(o); });
        document.getElementById('lightHistoryCount').textContent = list.length;
    }
    document.getElementById('lightApplyHistoryBtn').addEventListener('click', ()=>{
        const v = historySelect.value; if(!v) return;
        if(v.startsWith('http')){ urlInput.value=v; applyUrl.click(); }
        else { parseInput.value=v; parseBtn.click(); }
    });
    document.getElementById('lightClearHistoryBtn').addEventListener('click', ()=>{
        localStorage.removeItem(STORAGE_KEY); renderHistory();
    });
    document.getElementById('lightAddHistoryBtn').addEventListener('click', ()=>{
        const raw = document.getElementById('lightNewHistoryInput').value.trim();
        if(!raw) return; let label=raw, value=raw;
        const bv=raw.match(/BV[a-zA-Z0-9]{10}/i)?.[0], av=raw.match(/av(\d+)/i)?.[0];
        if(bv){ value=bv; label=`BV:${bv}`; } else if(av){ value=av; label=`AV:${av}`; }
        const list = getHistory().filter(i=>i.value!==value);
        list.unshift({label,value}); saveHistory(list); renderHistory();
        document.getElementById('lightNewHistoryInput').value='';
    });
    document.getElementById('lightCaptureBtn').addEventListener('click', ()=>{
        const v = getActiveVideo(); const src=v.src; if(!src) return;
        const name = src.split('/').pop().split('?')[0] || '背景';
        const list = getHistory().filter(i=>i.value!==src);
        list.unshift({label:`🎬 ${name}`, value:src}); saveHistory(list); renderHistory();
    });
    renderHistory();

    
    const captchaModal = document.getElementById('captchaModal');
    const sliderThumb = document.getElementById('sliderThumb');
    const sliderTrack = document.getElementById('sliderTrack');
    const sliderText = document.getElementById('sliderText');
    const successMsg = document.getElementById('captchaSuccess');
    const cancelBtn = document.getElementById('captchaCancelBtn');
    let verified = false, dragging = false, startX = 0, startLeft = 0, maxLeft = 0;

    function getMaxLeft() {
        const cont = document.getElementById('sliderContainer');
        return cont.clientWidth - sliderThumb.offsetWidth;
    }
    function showCaptcha() {
        captchaModal.style.display = 'flex'; document.body.style.overflow = 'hidden';
        maxLeft = getMaxLeft();
        sliderThumb.style.left = '0px'; sliderTrack.style.width = '0%';
        sliderText.textContent = '拖动滑块到最右侧'; successMsg.style.display = 'none';
        verified = false;
    }
    function hideCaptcha() {
        captchaModal.style.display = 'none'; document.body.style.overflow = '';
        if(!verified) { otherToggle.checked = false; nextOtherBtn.disabled = true; }
    }
    function verifySuccess() {
        verified = true; sliderText.textContent = '验证通过！'; successMsg.style.display = 'block';
        otherToggle.checked = true; nextOtherBtn.disabled = false;
        setTimeout(hideCaptcha, 500);
    }
    function handleStart(e) {
        e.preventDefault(); if(verified) return;
        maxLeft = getMaxLeft(); dragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        startX = clientX; startLeft = parseFloat(sliderThumb.style.left) || 0;
        sliderThumb.style.transition = 'none'; sliderTrack.style.transition = 'none';
    }
    function handleMove(e) {
        if(!dragging || verified) return; e.preventDefault();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let newLeft = startLeft + (clientX - startX);
        newLeft = Math.max(0, Math.min(newLeft, maxLeft));
        sliderThumb.style.left = newLeft + 'px';
        sliderTrack.style.width = (newLeft/maxLeft*100) + '%';
        if(maxLeft - newLeft <= 0.5) {
            dragging = false; sliderThumb.style.transition = 'left 0.2s'; sliderTrack.style.transition = 'width 0.2s';
            sliderThumb.style.left = maxLeft+'px'; sliderTrack.style.width = '100%';
            verifySuccess();
        }
    }
    function handleEnd(e) {
        if(!dragging) return; dragging = false;
        sliderThumb.style.transition = 'left 0.3s'; sliderTrack.style.transition = 'width 0.3s';
        sliderThumb.style.left = '0px'; sliderTrack.style.width = '0%';
    }
    sliderThumb.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    sliderThumb.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleEnd);
    cancelBtn.addEventListener('click', hideCaptcha);
    captchaModal.addEventListener('click', e=>{ if(e.target===captchaModal) hideCaptcha(); });

    otherToggle.addEventListener('change', function(e) {
        if(this.checked && !verified) { e.preventDefault(); this.checked=false; showCaptcha(); }
        else nextOtherBtn.disabled = !this.checked;
    });
    nextOtherBtn.addEventListener('click', switchOther);

   
    function openDrawer() {
        overlay.style.display = 'block'; drawer.classList.add('show');
        document.body.style.overflow = 'hidden';
        musicToggle.checked = !getActiveVideo().muted;
    }
    function closeDrawer() {
        overlay.style.display = 'none'; drawer.classList.remove('show');
        document.body.style.overflow = '';
    }
    drawerBtn.addEventListener('click', openDrawer);
    overlay.addEventListener('click', closeDrawer);

    
    let dragY = 0, dragActive = false;
    handle.addEventListener('mousedown', e=>{ dragY=e.clientY; dragActive=true; drawer.style.transition='none'; });
    window.addEventListener('mousemove', e=>{ if(!dragActive) return; const d=e.clientY-dragY; if(d>0) drawer.style.transform=`translateY(${d}px)`; });
    window.addEventListener('mouseup', e=>{ if(!dragActive) return; dragActive=false; drawer.style.transition=''; if(e.clientY-dragY>70) closeDrawer(); else drawer.style.transform=''; });
    handle.addEventListener('touchstart', e=>{ dragY=e.touches[0].clientY; dragActive=true; drawer.style.transition='none'; }, {passive:false});
    window.addEventListener('touchmove', e=>{ if(!dragActive) return; const d=e.touches[0].clientY-dragY; if(d>0) drawer.style.transform=`translateY(${d}px)`; }, {passive:false});
    window.addEventListener('touchend', e=>{ if(!dragActive) return; dragActive=false; drawer.style.transition=''; const d=(e.changedTouches[0]?.clientY||dragY)-dragY; if(d>70) closeDrawer(); else drawer.style.transform=''; });

    
    let clickCnt=0, timer;
    drawerBtn.addEventListener('click', ()=>{
        clickCnt++; if(clickCnt===1) timer=setTimeout(()=>clickCnt=0,800);
        if(clickCnt===3){ clearTimeout(timer); clickCnt=0; secret.classList.add('visible'); alert('哎呀怎么藏这里了还是被你找到了喵～'); }
    });

    
    const FIXED_URL = 'https://qm.qq.com/q/R2nvpINxe2';
    const serverModal = document.getElementById('previewModal');
    const qqModal = document.getElementById('qqModal');
    const fixedIframe = document.getElementById('fixedIframe');
    document.getElementById('btn1').addEventListener('click', ()=>{
        serverModal.style.display='flex'; qqModal.style.display='none';
        fixedIframe.src = FIXED_URL;
    });
    document.getElementById('btn2').addEventListener('click', ()=>alert('真的就是个测试的别看了😡'));
    document.getElementById('btn3').addEventListener('click', ()=>{
        qqModal.style.display='flex'; serverModal.style.display='none';
    });
    document.getElementById('closePreviewBtn').addEventListener('click', ()=>serverModal.style.display='none');
    document.getElementById('closeQQModalBtn').addEventListener('click', ()=>qqModal.style.display='none');
    document.getElementById('openQQHomeBtn').addEventListener('click', ()=>window.open('https://qm.qq.com/q/POMQp4DwCC','_blank'));
    window.addEventListener('keydown', e=>{ if(e.key==='Escape'){ serverModal.style.display='none'; qqModal.style.display='none'; }});

    console.log('✅ 设置菜单已修复，滑动验证流畅');
})();
</script>



<script>
(function() {
    "use strict";

   
    const MIRRORS = [
        { name: 'vilipix.com', domain: 'vilipix.com' },
        { name: 'pixiviz.xyz', domain: 'pixiviz.xyz' },
        { name: 'pixivel.moe', domain: 'pixivel.moe' },
        { name: 'pixivic.com', domain: 'pixivic.com' }
    ];
    let currentMirror = MIRRORS[0];

    
    function waitForSecretSection(callback, maxAttempts = 50) {
        let attempts = 0;
        function check() {
            const secret = document.getElementById('lightSecretSection');
            if (secret) {
                callback(secret);
            } else if (attempts < maxAttempts) {
                attempts++;
                setTimeout(check, 200);
            } else {
                console.warn('Pixiv模块：未找到彩蛋区域 #lightSecretSection');
            }
        }
        check();
    }

    // 转换 URL 到指定镜像域名（直接替换 hostname）
    function applyMirror(url, mirrorDomain) {
        if (!url) return url;
        try {
            const urlObj = new URL(url);
            urlObj.hostname = mirrorDomain;
            return urlObj.toString();
        } catch (e) {
            return url.replace(/\/\/[^\/]+/, '//' + mirrorDomain);
        }
    }

    
    function injectPixivUI(secretSection) {
        if (document.getElementById('pixivModuleContainer')) return;

        const container = document.createElement('div');
        container.id = 'pixivModuleContainer';
        container.style.cssText = 'margin-top:20px; border-top:1px dashed #3a4a5a; padding-top:16px;';

        container.innerHTML = `
            <div class="light-item">
                <span>Pixiv 背景</span>
                <label class="light-switch">
                    <input type="checkbox" id="pixivToggle">
                    <span class="light-slider"></span>
                </label>
            </div>
            <div id="pixivPanel" style="display:none; margin-top:12px;">
                <div class="light-item" style="margin-bottom:10px;">
                    <span>🔞 允许 R18</span>
                    <label class="light-switch">
                        <input type="checkbox" id="pixivR18">
                        <span class="light-slider"></span>
                    </label>
                </div>
                <input class="light-input" id="pixivTags" placeholder="标签 (空格分隔，如：少女 风景)" style="margin-bottom:8px;">
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
                    <input class="light-input" id="pixivCount" type="number" min="1" max="10" value="1" style="width:80px; margin:0;">
                    <span style="color:#ccc; font-size:0.8rem;">数量 1-10</span>
                </div>
                <div style="margin-bottom:8px; display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
                    <span style="color:#ccc; font-size:0.8rem;">镜像:</span>
                    <button class="light-btn small mirror-btn" data-mirror="0">vilipix.com</button>
                    <button class="light-btn small mirror-btn" data-mirror="1">pixiviz.xyz</button>
                    <button class="light-btn small mirror-btn" data-mirror="2">pixivel.moe</button>
                    <button class="light-btn small mirror-btn" data-mirror="3">pixivic.com</button>
                    <span id="currentMirrorLabel" style="margin-left:6px; color:#5f9eff; font-size:0.8rem;">vilipix.com</span>
                </div>
                <button class="light-btn" id="pixivFetchBtn" style="width:100%; margin-bottom:8px;">🎲 获取图片</button>
                <div id="pixivPreview" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:10px 0;"></div>
                <button class="light-btn small" id="pixivApplyBtn" style="width:100%;" disabled>🖼️ 设为背景</button>
                <div id="pixivStatus" style="font-size:0.75rem; margin-top:8px; opacity:0.8; text-align:center;"></div>
            </div>
        `;

        secretSection.appendChild(container);
        initPixivLogic();
    }

    function initPixivLogic() {
        const toggle = document.getElementById('pixivToggle');
        const panel = document.getElementById('pixivPanel');
        const r18Check = document.getElementById('pixivR18');
        const tagsInput = document.getElementById('pixivTags');
        const countInput = document.getElementById('pixivCount');
        const fetchBtn = document.getElementById('pixivFetchBtn');
        const applyBtn = document.getElementById('pixivApplyBtn');
        const previewDiv = document.getElementById('pixivPreview');
        const statusDiv = document.getElementById('pixivStatus');
        const mirrorLabel = document.getElementById('currentMirrorLabel');
        const mirrorBtns = document.querySelectorAll('.mirror-btn');

        
        let pixivBgImage = null;
        const videoBgContainer = document.querySelector('.video-bg');
        if (videoBgContainer) {
            pixivBgImage = document.createElement('img');
            pixivBgImage.id = 'pixivBgImage';
            pixivBgImage.style.cssText = `
                position: absolute; top: 0; left: 0;
                width: 100%; height: 100%; object-fit: cover;
                display: none; z-index: 0;
            `;
            videoBgContainer.appendChild(pixivBgImage);
        }

        const desktopVideo = document.getElementById('desktopVideo');
        const mobileVideo = document.getElementById('mobileVideo');

        let originalUrls = [];
        let currentPreviewUrls = [];
        let selectedUrl = '';

        
        function switchMirror(mirror) {
            currentMirror = mirror;
            mirrorLabel.textContent = mirror.name;
            if (originalUrls.length > 0) {
                currentPreviewUrls = originalUrls.map(url => applyMirror(url, mirror.domain));
                renderPreviews(currentPreviewUrls);
                statusDiv.textContent = `已切换到 ${mirror.name}`;
                if (selectedUrl) {
                    const originalSelected = originalUrls.find((url, idx) => applyMirror(url, currentMirror.domain) === selectedUrl);
                    selectedUrl = originalSelected ? applyMirror(originalSelected, currentMirror.domain) : (currentPreviewUrls[0] || '');
                }
                applyBtn.disabled = !selectedUrl;
            }
        }

        
        mirrorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.mirror);
                if (!isNaN(idx) && MIRRORS[idx]) {
                    switchMirror(MIRRORS[idx]);
                }
            });
        });

        function renderPreviews(urls) {
            previewDiv.innerHTML = '';
            urls.forEach((url) => {
                const thumb = document.createElement('img');
                thumb.src = url;
                thumb.style.cssText = 'width:60px; height:60px; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid transparent;';
                thumb.addEventListener('click', () => {
                    previewDiv.querySelectorAll('img').forEach(img => img.style.borderColor = 'transparent');
                    thumb.style.borderColor = '#5f9eff';
                    selectedUrl = url;
                    applyBtn.disabled = false;
                });
                previewDiv.appendChild(thumb);
            });
            if (urls.length > 0) {
                previewDiv.firstChild.click();
            }
        }

        toggle.addEventListener('change', function() {
            panel.style.display = this.checked ? 'block' : 'none';
            if (!this.checked) {
                restoreVideo();
                applyBtn.disabled = true;
                originalUrls = [];
                currentPreviewUrls = [];
                previewDiv.innerHTML = '';
                selectedUrl = '';
            }
        });

        function restoreVideo() {
            if (pixivBgImage) pixivBgImage.style.display = 'none';
            if (desktopVideo && mobileVideo) {
                const isMobile = /iPhone|iPad|Android|Mobile|iPod/i.test(navigator.userAgent);
                const isLandscape = window.matchMedia('(orientation: landscape)').matches;
                const useDesktop = !isMobile || isLandscape;
                desktopVideo.style.display = useDesktop ? 'block' : 'none';
                mobileVideo.style.display = useDesktop ? 'none' : 'block';
            }
        }

        fetchBtn.addEventListener('click', async function() {
            const tags = tagsInput.value.trim();
            let count = parseInt(countInput.value);
            if (isNaN(count) || count < 1) count = 1;
            if (count > 10) count = 10;
            const r18 = r18Check.checked;

            previewDiv.innerHTML = '';
            originalUrls = [];
            currentPreviewUrls = [];
            applyBtn.disabled = true;
            statusDiv.textContent = '⏳ 获取中...';
            fetchBtn.disabled = true;
            fetchBtn.textContent = '获取中...';

            try {
                const tagArray = tags ? tags.split(/\s+/) : [];
                let apiUrl = `https://api.lolicon.app/setu/v2?r18=${r18 ? 1 : 0}&num=${count}&size=original`;
                if (tagArray.length > 0) {
                    apiUrl += '&tag=' + encodeURIComponent(tagArray.join('|'));
                }

                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.code === 0 && data.data && data.data.length > 0) {
                    data.data.forEach(item => {
                        originalUrls.push(item.urls.original);
                    });
                    currentPreviewUrls = originalUrls.map(url => applyMirror(url, currentMirror.domain));
                    renderPreviews(currentPreviewUrls);
                    statusDiv.textContent = `✅ 共 ${originalUrls.length} 张 (${currentMirror.name})`;
                } else {
                    statusDiv.textContent = '⚠️ 无结果，尝试更换标签';
                }
            } catch (e) {
                console.error('Pixiv API 错误:', e);
                statusDiv.textContent = '❌ 网络错误，请稍后重试';
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.textContent = '🎲 获取图片';
            }
        });

        applyBtn.addEventListener('click', function() {
            if (selectedUrl && pixivBgImage) {
                if (desktopVideo) desktopVideo.style.display = 'none';
                if (mobileVideo) mobileVideo.style.display = 'none';
                pixivBgImage.src = selectedUrl;
                pixivBgImage.style.display = 'block';
                const hint = document.getElementById('bgHint');
                if (hint) hint.textContent = `Pixiv · ${selectedUrl.split('/').pop()}`;
                statusDiv.textContent = '✅ 已设为背景';
            }
        });

        window.addEventListener('resize', () => {
            if (toggle.checked && pixivBgImage && pixivBgImage.style.display === 'block') {
                if (desktopVideo) desktopVideo.style.display = 'none';
                if (mobileVideo) mobileVideo.style.display = 'none';
            }
        });
    }

    // 启动
    waitForSecretSection((secretSection) => {
        injectPixivUI(secretSection);
        const observer = new MutationObserver((mutations) => {
            mutations.forEach(mut => {
                if (mut.target.classList.contains('visible')) {
                    injectPixivUI(secretSection);
                }
            });
        });
        observer.observe(secretSection, { attributes: true, attributeFilter: ['class'] });
    });

})();
</script>
